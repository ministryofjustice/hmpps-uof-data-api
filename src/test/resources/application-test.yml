server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

api:
  base:
    url:
      oauth: http://localhost:8090/auth

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/use-of-force?sslmode=prefer
    username: use-of-force
    password: use-of-force
    hikari:
      pool-name: UoFDAPI-DB-CP
      maximum-pool-size: 10

  main:
    allow-bean-definition-overriding: true

  jpa:
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/
    baseline-on-migrate: true

hmpps:
  sar:
    tests:
      attachments-expected: true
      expected-flyway-schema-version: 1.3
      expected-jpa-entity-schema:
        path: /sar/entity-schema.json
      expected-api-response:
        path: /sar/sar-api-response.json
      expected-render-result:
        path: /sar/sar-generated-report.html